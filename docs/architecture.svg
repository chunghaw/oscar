<svg xmlns="http://www.w3.org/2000/svg" width="1040" height="760" viewBox="0 0 1040 760" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f8a7d"/><stop offset="0.45" stop-color="#46796f"/><stop offset="1" stop-color="#50708a"/>
    </linearGradient>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10z" fill="#8a938e"/>
    </marker>
    <style>
      .h{fill:#20262a;font-weight:700}.s{fill:#687069}.w{fill:#fff}.lbl{fill:#5b6b66;font-size:12px}
      .card{fill:#fff;stroke:#dde3df}.tag{font-size:11px;font-weight:700;letter-spacing:.4px}
    </style>
  </defs>

  <rect width="1040" height="760" fill="#eef1ef"/>
  <text x="40" y="52" font-size="27" font-weight="700" fill="#20262a">Goldvale — one Aurora backend, four load-bearing layers</text>
  <text x="40" y="78" font-size="14" class="s">A calm daily companion + home-rehab tracker for senior/chronic dogs &amp; cats · H0 hackathon (Vercel + AWS)</text>

  <!-- USER -->
  <g>
    <rect x="40" y="108" width="220" height="92" rx="16" class="card"/>
    <text x="64" y="146" font-size="16" class="h">📱 Owner (mobile PWA)</text>
    <text x="64" y="170" class="lbl">20-second daily check-in</text>
    <text x="64" y="188" class="lbl">trend · recall · vet-ready brief</text>
  </g>

  <!-- VERCEL -->
  <g>
    <rect x="40" y="240" width="500" height="150" rx="18" fill="#fff" stroke="#dde3df"/>
    <rect x="40" y="240" width="500" height="40" rx="18" fill="#20262a"/>
    <text x="62" y="266" font-size="15" class="w" font-weight="700">▲ Vercel — Next.js 16 (App Router · React 19 · TS)</text>
    <g font-size="12.5" fill="#2a2f33">
      <rect x="60" y="300" width="200" height="32" rx="9" fill="#f2f5f3" stroke="#e8ece9"/>
      <text x="74" y="321">Server Components — reads</text>
      <rect x="60" y="342" width="200" height="32" rx="9" fill="#f2f5f3" stroke="#e8ece9"/>
      <text x="74" y="363">Server Actions — check-in writes</text>
      <rect x="276" y="300" width="246" height="32" rx="9" fill="#f2f5f3" stroke="#e8ece9"/>
      <text x="290" y="321">lib/domain — deterministic scoring</text>
      <rect x="276" y="342" width="246" height="32" rx="9" fill="#fbeee0" stroke="#e9d4b3"/>
      <text x="290" y="363" fill="#8a6410">assertNonClinical() guardrail</text>
    </g>
  </g>
  <text x="290" y="226" font-size="12" class="s" text-anchor="middle">HTTPS</text>
  <line x1="150" y1="200" x2="150" y2="240" stroke="#8a938e" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- BEDROCK -->
  <g>
    <rect x="600" y="240" width="400" height="150" rx="18" fill="#fff" stroke="#dde3df"/>
    <rect x="600" y="240" width="400" height="40" rx="18" fill="#b3654a"/>
    <text x="622" y="266" font-size="15" class="w" font-weight="700">🤖 Amazon Bedrock (Vercel AI SDK)</text>
    <rect x="620" y="300" width="360" height="34" rx="9" fill="#f6efe9" stroke="#e9d9cd"/>
    <text x="636" y="322" font-size="12.5" fill="#2a2f33">Claude Sonnet 4.6 — narrates trends, never diagnoses</text>
    <rect x="620" y="344" width="360" height="34" rx="9" fill="#f6efe9" stroke="#e9d9cd"/>
    <text x="636" y="366" font-size="12.5" fill="#2a2f33">Titan Text Embeddings v2 — 1024-dim vectors</text>
  </g>
  <line x1="540" y1="330" x2="600" y2="330" stroke="#8a938e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="570" y="322" font-size="11" class="s" text-anchor="middle">narrate /</text>
  <text x="570" y="346" font-size="11" class="s" text-anchor="middle">embed</text>

  <!-- AURORA -->
  <g>
    <rect x="40" y="430" width="960" height="290" rx="20" fill="url(#hero)"/>
    <text x="64" y="470" font-size="18" class="w" font-weight="700">AWS Aurora PostgreSQL — Serverless v2 (pgvector)</text>
    <text x="64" y="492" font-size="12.5" fill="#dfeae6">the ONE backend · Drizzle ORM · SSL · the deliberate data model the DB judges score</text>

    <!-- 4 layer cards -->
    <g>
      <rect x="64" y="514" width="220" height="178" rx="14" fill="#ffffff"/>
      <text x="82" y="544" class="tag" fill="#5b7a99">1 · RELATIONAL</text>
      <text x="82" y="572" font-size="13" fill="#2a2f33">owners · pets</text>
      <text x="82" y="594" font-size="13" fill="#2a2f33">exercise_plans · plan_items</text>
      <text x="82" y="616" font-size="13" fill="#2a2f33">protocols · red_flag_rules</text>
      <text x="82" y="638" font-size="13" fill="#2a2f33">scale_instruments</text>
      <text x="82" y="672" font-size="11.5" fill="#687069">licensing-gated scales</text>
    </g>
    <g>
      <rect x="296" y="514" width="220" height="178" rx="14" fill="#ffffff"/>
      <text x="314" y="544" class="tag" fill="#3f8f86">2 · TIME-SERIES</text>
      <text x="314" y="572" font-size="13" fill="#2a2f33">daily_checkins</text>
      <text x="314" y="594" font-size="13" fill="#2a2f33">mobility_score_events</text>
      <text x="314" y="616" font-size="13" fill="#2a2f33">exercise_session_events</text>
      <text x="314" y="638" font-size="13" fill="#2a2f33">medication_events</text>
      <text x="314" y="672" font-size="11.5" fill="#687069">range-partitioned by month</text>
    </g>
    <g>
      <rect x="528" y="514" width="220" height="178" rx="14" fill="#ffffff"/>
      <text x="546" y="544" class="tag" fill="#7d6b96">3 · PGVECTOR</text>
      <text x="546" y="572" font-size="13" fill="#2a2f33">journal_entries</text>
      <text x="546" y="594" font-size="13" fill="#2a2f33">literature_chunks</text>
      <text x="546" y="616" font-size="13" fill="#2a2f33">mobility/pose embeddings</text>
      <text x="546" y="650" font-size="11.5" fill="#687069">HNSW cosine kNN —</text>
      <text x="546" y="668" font-size="11.5" fill="#687069">"resembles a past flare"</text>
    </g>
    <g>
      <rect x="760" y="514" width="220" height="178" rx="14" fill="#ffffff"/>
      <text x="778" y="544" class="tag" fill="#b3654a">4 · ANALYTICS</text>
      <text x="778" y="572" font-size="13" fill="#2a2f33">rolling_baseline_mv</text>
      <text x="778" y="594" font-size="13" fill="#2a2f33">adherence_rollup_mv</text>
      <text x="778" y="628" font-size="11.5" fill="#687069">materialized views —</text>
      <text x="778" y="646" font-size="11.5" fill="#687069">baselines, MCID flags,</text>
      <text x="778" y="664" font-size="11.5" fill="#687069">weekly adherence</text>
    </g>
  </g>
  <line x1="290" y1="390" x2="290" y2="430" stroke="#8a938e" stroke-width="1.5" marker-start="url(#arr)" marker-end="url(#arr)"/>
  <text x="330" y="414" font-size="11" class="s">Drizzle · SSL</text>
</svg>
